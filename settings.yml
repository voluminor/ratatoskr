# Supported types:
#   scalar:  string, bool, int, int8, int16, int32, int64,
#            uint, uint8, uint16, uint32, uint64,
#            float32, float64, duration
#   array:   []string, []bool, []int, []int64, []uint, []uint64,
#            []float32, []float64, []duration
#   enum:    add "enum: [val1, val2, ...]" — generates uint16 const type
#            (type field is optional for enums)
#   []enum:  array of enum values
#   trigger: true — CLI-only bool flag, not saved/parsed from config files

config:
  type: string
  usage: "path to config file (json/yaml/hjson)"

gen_key:
  usage: "generate new encryption key and exit"
  trigger: true

save_config:
  type: string
  usage: "save current settings to file and exit"
  trigger: true

log:
  usage: "logging configuration"
  compress:
    type: bool
    value: true
    usage: "compress rotated log files"
  file_path:
    type: string
    usage: "log file path (auto-detected if empty)"
  format:
    value: "text"
    usage: "console format"
    enum: [ text, json ]
  level:
    usage: "log level thresholds"
    console:
      value: "debug"
      usage: "console log level"
      enum: &log_levels [ debug, info, warn, error, fatal, panic, disabled ]
    file:
      value: "info"
      usage: "file log level"
      enum: *log_levels
  max_age:
    type: int
    value: 30
    usage: "log file max age (days)"
  max_backups:
    type: int
    value: 3
    usage: "log file max backups"
  max_size:
    type: int
    value: 32
    usage: "log file max size (MB)"
  output:
    value: "both"
    usage: "log output mode"
    enum: [ console, file, both ]

ui:
  usage: "user interface settings"
  text_size:
    type: float32
    value: 1.0
    usage: "text size multiplier (0.2-8.0)"
  dark_mode:
    type: bool
    value: true
    usage: "dark mode enabled"
  tab_location:
    value: "top"
    usage: "tab position"
    enum: [ top, bottom, leading, trailing ]
  language:
    type: string
    value: "en"
    usage: "UI language"
