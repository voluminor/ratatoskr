name: "Tests"

permissions:
  contents: read

concurrency:
  group: tests-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '**.md'
      - '**.txt'

jobs:
  changes:
    name: "🔎 Detect changed areas"
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.diff.outputs.root }}
      cmd: ${{ steps.diff.outputs.cmd }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🔎 Classify changed files
        id: diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          root=false
          cmd=false
          while IFS= read -r path; do
            case "$path" in
              *.md|*.txt)
                ;;
              cmd/*)
                cmd=true
                ;;
              .github/actions/init-go/*|.github/actions/prepare-cmd/*|.github/actions/run-cmd-tests/*|.github/workflows/release.yml|.github/workflows/tests.yml)
                root=true
                cmd=true
                ;;
              *)
                root=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "root=${root}" >> "$GITHUB_OUTPUT"
          echo "cmd=${cmd}" >> "$GITHUB_OUTPUT"
          echo "root=${root}, cmd=${cmd}"

  root-prepare:
    name: "🔧 Prepare root"
    needs: [ changes ]
    if: needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - uses: ./.github/actions/init-go

      - uses: ./.github/actions/tidy-all-and-generate
        with:
          check-clean: 'true'

      - name: 📦 Upload prepared root
        uses: actions/upload-artifact@v7
        with:
          name: root-src
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .
            !.git
            !.git/**

  root-test:
    name: "🧪 Root [${{ matrix.os }}]"
    needs: [ changes, root-prepare ]
    if: needs.root-prepare.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: 📥 Download prepared root
        uses: actions/download-artifact@v8
        with:
          name: root-src
          path: .

      - uses: ./.github/actions/init-go

      - uses: ./.github/actions/run-tests
        with:
          run-benchmarks: 'false'

  root-quality:
    name: "🔍 Root quality"
    needs: [ changes, root-prepare ]
    if: needs.root-prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: 📥 Download prepared root
        uses: actions/download-artifact@v8
        with:
          name: root-src
          path: .

      - uses: ./.github/actions/init-go

      - name: 🔍 Analyze root module
        shell: bash
        run: |
          set -Eeuo pipefail
          GOWORK=off go vet ./...
          GOWORK=off go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
          GOWORK=off go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...
          GOWORK=off go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          GOWORK=off go run github.com/rhysd/actionlint/cmd/actionlint@latest -color

  root-smoke:
    name: "🔥 Root integration smoke"
    needs: [ changes, root-prepare ]
    if: needs.root-prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: 📥 Download prepared root
        uses: actions/download-artifact@v8
        with:
          name: root-src
          path: .

      - name: 🔥 Run smoke scenario
        shell: bash
        run: bash tests/scripts/up.sh --verify

  cmd-prepare:
    name: "🔧 Prepare cmd"
    needs: [ changes ]
    if: needs.changes.outputs.cmd == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - uses: ./.github/actions/init-go
        with:
          cache-scope: cmd

      - name: 🔧 Prepare root dependency
        uses: ./.github/actions/tidy-all-and-generate
        with:
          check-clean: 'true'

      - uses: ./.github/actions/prepare-cmd
        with:
          scope: all
          check-clean: 'true'

      - name: 📦 Upload prepared cmd tree
        uses: actions/upload-artifact@v7
        with:
          name: cmd-src
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .
            !.git
            !.git/**

  cmd-test:
    name: "🧪 Cmd [${{ matrix.os }}]"
    needs: [ changes, cmd-prepare ]
    if: needs.cmd-prepare.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: 📥 Download prepared cmd tree
        uses: actions/download-artifact@v8
        with:
          name: cmd-src
          path: .

      - uses: ./.github/actions/init-go
        with:
          cache-scope: cmd

      - uses: ./.github/actions/run-cmd-tests

  gate:
    name: "✅ Verification gate"
    if: always()
    needs:
      - changes
      - root-prepare
      - root-test
      - root-quality
      - root-smoke
      - cmd-prepare
      - cmd-test
    runs-on: ubuntu-latest
    env:
      ROOT_CHANGED: ${{ needs.changes.outputs.root }}
      CMD_CHANGED: ${{ needs.changes.outputs.cmd }}
      CHANGES_RESULT: ${{ needs.changes.result }}
      ROOT_PREPARE_RESULT: ${{ needs.root-prepare.result }}
      ROOT_TEST_RESULT: ${{ needs.root-test.result }}
      ROOT_QUALITY_RESULT: ${{ needs.root-quality.result }}
      ROOT_SMOKE_RESULT: ${{ needs.root-smoke.result }}
      CMD_PREPARE_RESULT: ${{ needs.cmd-prepare.result }}
      CMD_TEST_RESULT: ${{ needs.cmd-test.result }}
    steps:
      - name: 🚦 Check isolated results
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "change detection failed" >&2
            exit 1
          fi
          if [ "$ROOT_CHANGED" = "true" ]; then
            for result in "$ROOT_PREPARE_RESULT" "$ROOT_TEST_RESULT" "$ROOT_QUALITY_RESULT" "$ROOT_SMOKE_RESULT"; do
              if [ "$result" != "success" ]; then
                echo "root verification failed: ${result}" >&2
                exit 1
              fi
            done
          fi
          if [ "$CMD_CHANGED" = "true" ]; then
            for result in "$CMD_PREPARE_RESULT" "$CMD_TEST_RESULT"; do
              if [ "$result" != "success" ]; then
                echo "cmd verification failed: ${result}" >&2
                exit 1
              fi
            done
          fi
          echo "verification succeeded"
