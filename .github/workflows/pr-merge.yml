name: "Root merge patch bump"

permissions:
  contents: write

concurrency:
  group: root-merge-patch-main
  cancel-in-progress: false

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]
    paths-ignore:
      - 'cmd/**'
      - '**.md'
      - '**.txt'

jobs:
  prepare:
    name: "🔧 Prepare root"
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - uses: ./.github/actions/init-go

      - uses: ./.github/actions/tidy-all-and-generate
        with:
          check-clean: 'true'

      - name: 📦 Upload prepared root
        uses: actions/upload-artifact@v7
        with:
          name: merge-root-src
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .
            !.git
            !.git/**

  test:
    name: "🧪 Root [${{ matrix.os }}]"
    needs: [ prepare ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - name: 🛎️ Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: 📥 Download prepared root
        uses: actions/download-artifact@v8
        with:
          name: merge-root-src
          path: .

      - uses: ./.github/actions/init-go

      - uses: ./.github/actions/run-tests
        with:
          run-benchmarks: 'false'

  bump-version:
    name: "📦 Patch version bump"
    needs: [ test ]
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/github-setup-user

      - uses: ./.github/actions/init-go

      - name: 📦 Increment patch version
        shell: bash
        run: |
          set -Eeuo pipefail
          gometagen="github.com/amazing-generators/gometagen/cmd/gometagen@latest"
          new_version=$(GOWORK=off go run "$gometagen" version patch -source _run/values.yml)
          echo "New version ${new_version}"

          git add _run/values.yml
          git diff --cached --quiet || git commit -m "patch(${new_version}): auto-bump root module [skip ci]"
          git push origin HEAD:main

      - name: 🧹 Cleanup artifact
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: merge-root-src
          failOnError: false
