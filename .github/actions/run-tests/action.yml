name: 'Run tests and benchmarks'
description: 'Run go test with race detector and benchmarks'
inputs:
  run-benchmarks:
    description: 'Run benchmarks after tests (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 🧪 Run tests
      shell: bash
      run: |
        set -Eeuo pipefail
        go list -m -f '{{if .Main}}{{.Dir}}{{end}}' all | while read -r dir; do
          [ -n "$dir" ] || continue
          echo "Testing ${dir}"
          go -C "$dir" test -race -v ./...
        done

    - name: 📊 Run benchmarks
      if: inputs.run-benchmarks == 'true'
      shell: bash
      run: |
        set -Eeuo pipefail
        go list -m -f '{{if .Main}}{{.Dir}}{{end}}' all | while read -r dir; do
          [ -n "$dir" ] || continue
          echo "Benchmarking ${dir}"
          go -C "$dir" test -bench=. -run=NONE -benchmem -v ./...
        done
