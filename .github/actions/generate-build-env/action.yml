name: 'Read build metadata'
description: 'Read the release name and version from the manifest'
outputs:
  name:
    description: 'Build package name'
    value: ${{ steps.ver.outputs.name }}
  version:
    description: 'Build version'
    value: ${{ steps.ver.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: 📥 Read build metadata
      id: ver
      shell: bash
      run: |
        set -Eeuo pipefail
        gometagen="github.com/amazing-generators/gometagen/cmd/gometagen@latest"
        build_name=$(GOWORK=off go run "$gometagen" manifest get -source ./_run/values.yml -field name)
        build_version=$(GOWORK=off go run "$gometagen" version print -source ./_run/values.yml)

        {
          echo "BUILD_NAME=${build_name}"
          echo "BUILD_VER=${build_version}"
        } > build_env.txt

        echo "name=${build_name}" >> "$GITHUB_OUTPUT"
        echo "version=${build_version}" >> "$GITHUB_OUTPUT"
        echo "Found version ${build_version} for ${build_name}"
