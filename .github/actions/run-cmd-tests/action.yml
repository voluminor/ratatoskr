name: 'Run command-module tests'
description: 'Test and build every isolated module under cmd'

runs:
  using: 'composite'
  steps:
    - name: 🧪 Test command modules
      shell: bash
      run: |
        set -Eeuo pipefail
        find cmd -name go.mod -type f -exec dirname {} \; | sort > "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"
        while IFS= read -r dir; do
          echo "Testing ${dir}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            GOWORK=off CGO_ENABLED=0 go -C "$dir" test -v ./...
          else
            GOWORK=off CGO_ENABLED=1 go -C "$dir" test -race -v ./...
          fi
        done < "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"

    - name: 🛠️ Build command modules
      shell: bash
      run: |
        set -Eeuo pipefail
        while IFS= read -r dir; do
          echo "Building ${dir}"
          GOWORK=off CGO_ENABLED=0 go -C "$dir" build -trimpath ./...
        done < "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"
