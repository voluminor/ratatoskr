name: 'Initialization of all packages'
description: 'Initialize all the modules and generate files'

runs:
  using: 'composite'
  steps:
    - name: 🛠️ go generate
      shell: bash
      run: |
        set -Eeuo pipefail
        mkdir -p target tmp
        go work sync
        go generate .

    - name: 📥 go mod tidy-all
      shell: bash
      run: |
        set -Eeuo pipefail
        go list -m -f '{{if .Main}}{{.Dir}}{{end}}' all | while read -r dir; do
          [ -n "$dir" ] || continue
          echo "Tidying ${dir}"
          go -C "$dir" mod tidy
        done

    - name: 🛠️ regenerate after tidy
      shell: bash
      run: |
        set -Eeuo pipefail
        mkdir -p target tmp
        go generate .
