name: 'Prepare root module'
description: 'Synchronize, tidy, and generate the root module only'
inputs:
  check-clean:
    description: 'Fail when preparation changes tracked files'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 🧭 Isolate the root workspace
      shell: bash
      run: |
        set -Eeuo pipefail
        work_dir="${RUNNER_TEMP}/ratatoskr-root-work"
        mkdir -p "$work_dir"
        rm -f "$work_dir/go.work" "$work_dir/go.work.sum"
        GOWORK=off go -C "$work_dir" work init "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/_generate/sigils"
        echo "RATATOSKR_ROOT_GOWORK=${work_dir}/go.work" >> "$GITHUB_ENV"

    - name: 🛠️ Generate root module
      shell: bash
      run: |
        set -Eeuo pipefail
        mkdir -p target tmp
        GOWORK="$RATATOSKR_ROOT_GOWORK" go generate .

    - name: 📥 Tidy root module
      shell: bash
      run: |
        set -Eeuo pipefail
        GOWORK=off go mod tidy

    - name: 🛠️ Regenerate after tidy
      shell: bash
      run: |
        set -Eeuo pipefail
        mkdir -p target tmp
        GOWORK="$RATATOSKR_ROOT_GOWORK" go generate .

    - name: 🧹 Check tracked root files
      if: inputs.check-clean == 'true'
      shell: bash
      run: |
        set -Eeuo pipefail
        git diff --exit-code
        status=$(git status --porcelain --untracked-files=no)
        if [ -n "$status" ]; then
          printf '%s\n' "$status"
          exit 1
        fi
