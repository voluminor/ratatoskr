name: 'Set up Go with cache'
description: 'Install Go from go.mod and restore module/build caches'
inputs:
  go-version:
    description: 'Deprecated compatibility input; go.mod is the source of truth'
    required: false
    default: ''
  cache-suffix:
    description: 'Optional cache discriminator for parallel target builds'
    required: false
    default: 'default'
  cache-scope:
    description: 'Dependency cache scope: root or cmd'
    required: false
    default: 'root'

runs:
  using: 'composite'
  steps:
    - name: 🔧 Install Go from go.mod
      uses: actions/setup-go@v5
      with:
        cache: false
        go-version-file: go.mod

    - name: 🧭 Read Go cache paths
      id: go-env
      shell: bash
      run: |
        set -Eeuo pipefail
        {
          echo "gocache=$(go env GOCACHE)"
          echo "gomodcache=$(go env GOMODCACHE)"
          echo "goversion=$(go env GOVERSION)"
        } >> "$GITHUB_OUTPUT"

    - name: 🗂️ Go module cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.go-env.outputs.gomodcache }}
        key: gomod-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-scope }}-${{ inputs.cache-scope == 'cmd' && hashFiles('go.mod', 'go.sum', 'cmd/**/go.mod', 'cmd/**/go.sum') || hashFiles('go.mod', 'go.sum', '_generate/**/go.mod', '_generate/**/go.sum') }}
        restore-keys: |
          gomod-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-scope }}-
          gomod-${{ runner.os }}-${{ inputs.cache-scope }}-

    - name: 🗂️ Go build cache
      if: runner.os != 'macOS'
      uses: actions/cache@v4
      with:
        path: ${{ steps.go-env.outputs.gocache }}
        key: gocache-${{ runner.os }}-${{ runner.arch }}-${{ steps.go-env.outputs.goversion }}-${{ github.job }}-${{ inputs.cache-suffix }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          gocache-${{ runner.os }}-${{ runner.arch }}-${{ steps.go-env.outputs.goversion }}-${{ github.job }}-${{ inputs.cache-suffix }}-
          gocache-${{ runner.os }}-${{ runner.arch }}-${{ steps.go-env.outputs.goversion }}-${{ github.job }}-
          gocache-${{ runner.os }}-${{ runner.arch }}-${{ steps.go-env.outputs.goversion }}-
          gocache-${{ runner.os }}-${{ runner.arch }}-
