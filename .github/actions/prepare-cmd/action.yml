name: 'Prepare command modules'
description: 'Generate and tidy isolated modules under cmd'
inputs:
  scope:
    description: 'all or ratatoskr'
    required: false
    default: 'all'
  check-clean:
    description: 'Fail when preparation changes tracked cmd files'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 🧭 Resolve command modules
      id: modules
      shell: bash
      env:
        SCOPE: ${{ inputs.scope }}
      run: |
        set -Eeuo pipefail
        case "$SCOPE" in
          all)
            find cmd -name go.mod -type f -exec dirname {} \; | sort > "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"
            ;;
          ratatoskr)
            printf '%s\n' cmd/ratatoskr > "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"
            ;;
          *)
            echo "unsupported cmd scope: ${SCOPE}" >&2
            exit 1
            ;;
        esac
        if [ ! -s "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt" ]; then
          echo "no cmd modules found" >&2
          exit 1
        fi
        cat "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"

    - name: 🧭 Resolve latest command generator
      shell: bash
      run: |
        set -Eeuo pipefail
        version=$(GOWORK=off go list -m -f '{{.Version}}' github.com/amazing-generators/goconfgen@latest)
        if [ -z "$version" ]; then
          echo "goconfgen latest version is empty" >&2
          exit 1
        fi
        echo "GOCONFGEN_VERSION=${version}" >> "$GITHUB_ENV"
        echo "Using goconfgen ${version}"

    - name: 🛠️ Generate command modules
      shell: bash
      run: |
        set -Eeuo pipefail
        while IFS= read -r dir; do
          echo "Generating ${dir}"
          GOWORK=off go -C "$dir" generate ./...
        done < "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"

    - name: 📥 Tidy command modules
      shell: bash
      run: |
        set -Eeuo pipefail
        while IFS= read -r dir; do
          echo "Tidying ${dir}"
          GOWORK=off go -C "$dir" mod tidy
        done < "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"

    - name: 🛠️ Regenerate command modules after tidy
      shell: bash
      run: |
        set -Eeuo pipefail
        while IFS= read -r dir; do
          echo "Regenerating ${dir}"
          GOWORK=off go -C "$dir" generate ./...
        done < "${RUNNER_TEMP}/ratatoskr-cmd-modules.txt"

    - name: 🧹 Check tracked command files
      if: inputs.check-clean == 'true'
      shell: bash
      run: |
        set -Eeuo pipefail
        git diff --exit-code -- cmd
        status=$(git status --porcelain --untracked-files=no -- cmd)
        if [ -n "$status" ]; then
          printf '%s\n' "$status"
          exit 1
        fi
