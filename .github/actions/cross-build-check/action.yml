name: 'Cross-build root module'
description: 'Compile all root-module packages for one GOOS/GOARCH target'
inputs:
  goos:
    description: 'Target operating system'
    required: true
  goarch:
    description: 'Target architecture'
    required: true
  goarm:
    description: 'ARM version; empty for non-ARM targets'
    required: false
    default: ''
  gomips:
    description: 'MIPS float mode; empty for non-MIPS targets'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 🛠️ Build ${{ inputs.goos }}/${{ inputs.goarch }}
      shell: bash
      env:
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
        GOARM: ${{ inputs.goarm }}
        GOMIPS: ${{ inputs.gomips }}
        CGO_ENABLED: '0'
      run: |
        set -Eeuo pipefail
        target="${GOOS}/${GOARCH}"
        if [ -n "$GOARM" ]; then
          target="${target}/v${GOARM}"
        fi
        if [ -n "$GOMIPS" ]; then
          target="${target}/${GOMIPS}"
        fi
        echo "Building root module for ${target}"
        GOWORK=off go build -trimpath ./...
