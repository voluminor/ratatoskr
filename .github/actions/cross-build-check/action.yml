name: 'Cross-platform build check'
description: 'Verify compilation for a specific GOOS/GOARCH target'
inputs:
  goos:
    description: 'Target OS (linux, windows, darwin, ...)'
    required: true
  goarch:
    description: 'Target architecture (amd64, arm64, arm, ...)'
    required: true
  goarm:
    description: 'ARM version (6, 7); empty for non-ARM'
    required: false
    default: ''
  gomips:
    description: 'MIPS float mode (softfloat); empty for non-MIPS'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 🛠️ Build ${{ inputs.goos }}/${{ inputs.goarch }}
      shell: bash
      env:
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
        GOARM: ${{ inputs.goarm }}
        GOMIPS: ${{ inputs.gomips }}
        CGO_ENABLED: '0'
      run: |
        set -Eeuo pipefail
        tag="${GOOS}/${GOARCH}"
        [[ -n "$GOARM" ]]  && tag="${tag}v${GOARM}"
        [[ -n "$GOMIPS" ]] && tag="${tag}/${GOMIPS}"
        echo "→ ${tag}"
        cd cmd/embedded/http && go build .
