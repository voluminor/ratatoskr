name: ratatoskr-tests

x-node-env: &node-env
  RTS_REBUILD: "${RTS_REBUILD:-1}"
  SRC: "/src"
  DATA: "/data"
  GOCACHE: "/cache/go-build"
  GOMODCACHE: "/cache/go-mod"
  GOPATH: "/cache/gopath"

x-node-common: &node-common
  image: rts-node:latest
  restart: unless-stopped
  networks: [ meshnet ]
  depends_on: [ ygg-hub-1, ygg-hub-2 ]
  stop_grace_period: 20s
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  environment: *node-env

networks:
  meshnet:
    driver: bridge

services:
  ygg-hub-1:
    image: rts-ygghub:latest
    container_name: rts-ygg-hub-1
    networks: [ meshnet ]
    environment:
      YGG_NAME: "ygg-hub-1"
      YGG_LISTEN_PORT: "7777"

  ygg-hub-2:
    image: rts-ygghub:latest
    container_name: rts-ygg-hub-2
    networks: [ meshnet ]
    depends_on: [ ygg-hub-1 ]
    environment:
      YGG_NAME: "ygg-hub-2"
      YGG_LISTEN_PORT: "7777"
      YGG_PEERS: "tcp://ygg-hub-1:7777"

  node-a:
    <<: *node-common
    container_name: rts-node-a
    environment:
      <<: *node-env
      CONFIG: "/data/config.json"
    volumes:
      - ..:/src:ro
      - ../tmp/tests/cache/go-build:/cache/go-build
      - ../tmp/tests/cache/go-mod:/cache/go-mod
      - ../tmp/tests/cache/gopath:/cache/gopath
      - ../tmp/tests/node-a:/data
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:16080:7070"
      - "127.0.0.1:11080:1080"

  node-b:
    <<: *node-common
    container_name: rts-node-b
    environment:
      <<: *node-env
      CONFIG: "/data/config.json"
    volumes:
      - ..:/src:ro
      - ../tmp/tests/cache/go-build:/cache/go-build
      - ../tmp/tests/cache/go-mod:/cache/go-mod
      - ../tmp/tests/cache/gopath:/cache/gopath
      - ../tmp/tests/node-b:/data
    ports:
      - "127.0.0.1:18081:8080"
      - "127.0.0.1:16081:7070"
      - "127.0.0.1:11081:1080"

  node-c:
    <<: *node-common
    container_name: rts-node-c
    environment:
      <<: *node-env
      CONFIG: "/data/config.json"
    volumes:
      - ..:/src:ro
      - ../tmp/tests/cache/go-build:/cache/go-build
      - ../tmp/tests/cache/go-mod:/cache/go-mod
      - ../tmp/tests/cache/gopath:/cache/gopath
      - ../tmp/tests/node-c:/data
    ports:
      - "127.0.0.1:18082:8080"
      - "127.0.0.1:16082:7070"
      - "127.0.0.1:11082:1080"

  verifier:
    image: rts-verifier:latest
    container_name: rts-verifier
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    profiles: [ "verify" ]
    networks: [ meshnet ]
    depends_on: [ node-a, node-b, node-c ]
    volumes:
      - ../tmp/tests/results:/out
